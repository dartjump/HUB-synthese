<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Chapitre 1 - Introduction | T1011</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-card: linear-gradient(145deg, rgba(39, 39, 42, 0.5), rgba(24, 24, 27, 0.8));
            --border: rgba(63, 63, 70, 0.5);
            --border-hover: rgba(113, 113, 122, 0.5);
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --shadow-glow: 0 0 60px -15px rgba(139, 92, 246, 0.3);
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.15), transparent),
                radial-gradient(ellipse 60% 50% at 100% 50%, rgba(139, 92, 246, 0.1), transparent),
                radial-gradient(ellipse 60% 50% at 0% 100%, rgba(6, 182, 212, 0.08), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
            transform: translateX(-3px);
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .header-score {
            text-align: center;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .score-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Progress Bar */
        .progress-container {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 32px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .progress-bar-bg {
            height: 10px;
            background: var(--bg-tertiary);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 100px;
            transition: width 0.5s ease;
            width: 0%;
        }

        /* Question Card */
        .question-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-type {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .option:hover {
            border-color: var(--border-hover);
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .option.selected {
            border-color: var(--accent-1);
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .option.correct {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }

        .option.incorrect {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Text Input for fill-in-the-blank */
        .fill-blank-input {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            width: 100%;
            max-width: 400px;
            transition: all 0.3s ease;
        }

        .fill-blank-input:focus {
            outline: none;
            border-color: var(--accent-1);
            background: var(--bg-tertiary);
        }

        .fill-blank-input.correct {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.1);
        }

        .fill-blank-input.incorrect {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Explanation */
        .explanation {
            margin-top: 20px;
            padding: 16px 20px;
            background: rgba(59, 130, 246, 0.05);
            border-left: 3px solid var(--accent-1);
            border-radius: 8px;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-1);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .explanation-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Buttons */
        .buttons-container {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -8px rgba(59, 130, 246, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        /* Results */
        .results-container {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            display: none;
        }

        .results-container.show {
            display: block;
        }

        .results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .results-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .results-score {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .result-stat {
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .result-stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .result-stat-value.success {
            color: var(--success);
        }

        .result-stat-value.danger {
            color: var(--danger);
        }

        .result-stat-value.primary {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-score {
                width: 100%;
            }

            .buttons-container {
                flex-direction: column;
            }

            .results-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>

}

/* ── Base reset ── */

/* ── Toggle button ── */
#theme-toggle {

<button id="theme-toggle" onclick="toggleTheme()" aria-label="Changer le thème">
  <span class="t-icon">☀️</span>
  <span class="t-label">Thème</span>
</button>
<script>
(function(){
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', function(){
    const lbl = document.querySelector('#theme-toggle .t-label');
    const icon = document.querySelector('#theme-toggle .t-icon');
    const t = document.documentElement.getAttribute('data-theme');
    if(lbl) lbl.textContent = t === 'dark' ? 'Clair' : 'Sombre';
    if(icon) icon.textContent = t === 'dark' ? '🌙' : '☀️';
  });
})();
function toggleTheme(){
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  const lbl = document.querySelector('#theme-toggle .t-label');
  const icon = document.querySelector('#theme-toggle .t-icon');
  if(lbl) lbl.textContent = next === 'dark' ? 'Clair' : 'Sombre';
  if(icon) icon.textContent = next === 'dark' ? '🌙' : '☀️';
}
</script>

                <span class="progress-text" id="progress-percentage">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <!-- Quiz Container -->
        <div id="quiz-container">
            <!-- Questions will be injected here -->
        </div>

        <!-- Results -->
        <div class="results-container" id="results-container">
            <div class="results-icon" id="results-icon">🎉</div>
            <h2 class="results-title" id="results-title">Quiz terminé !</h2>
            <p class="results-score" id="results-message">Excellent travail !</p>
            
            <div class="results-stats">
                <div class="result-stat">
                    <div class="result-stat-value primary" id="final-score">0%</div>
                    <div class="result-stat-label">Score Final</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value success" id="correct-answers">0</div>
                    <div class="result-stat-label">Correctes</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value danger" id="incorrect-answers">0</div>
                    <div class="result-stat-label">Incorrectes</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value primary" id="xp-earned">0</div>
                    <div class="result-stat-label">XP Gagné</div>
                </div>
            </div>

            <div class="buttons-container">
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">Retour</button>
                <button class="btn btn-primary" onclick="restartQuiz()">Recommencer</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Base de données des questions du Chapitre 1
         * Types: 'qcm' (1 réponse), 'qrm' (plusieurs réponses), 'fill' (texte à trou)
         */
        const questionsBank = [
            // QCM
            {
                type: 'qcm',
                question: "En quelle année l'ENIAC, considéré comme le premier ordinateur électronique, a-t-il été créé ?",
                options: ["1943", "1946", "1948", "1951"],

                explanation: "L'ENIAC (Electronic Numerical Integrator And Computer) a été créé en 1946 par John W. Mauchly et Prosper Eckert à l'Université de Pennsylvanie."
            },
            {
                type: 'qcm',
                question: "Qui est le mathématicien ayant décrit le concept de 'programme enregistré' qui est à la base des ordinateurs modernes ?",
                options: ["Alan Turing", "Claude Shannon", "John von Neumann", "John Mauchly"],
                correct: 2,
                explanation: "John von Neumann a été le premier à décrire la notion de programme enregistré, où les instructions sont stockées sous forme de codes numériques dans la mémoire."
            },
            {
                type: 'qcm',
                question: "Combien de tubes électroniques (lampes) composaient l'ENIAC ?",

            },
            {
                type: 'qcm',
                question: "Quel est le principal inconvénient d'un langage compilé par rapport à un langage interprété ?",
                options: [

                correct: 1,

            },
            {
                type: 'qcm',
                question: "Quel langage de programmation est le plus RAPIDE à l'exécution ?",
                options: ["Python (interprété)", "Java (compilé)", "Assembleur", "PHP (interprété)"],
                correct: 2,
                explanation: "L'assembleur est le langage le plus rapide car il correspond directement aux instructions machine, sans couche d'abstraction supplémentaire."
            },
            {
                type: 'qcm',
                question: "En 1947, quel ordinateur fut le premier calculateur à programme enregistré selon l'architecture de von Neumann ?",
                options: ["ENIAC", "EDVAC", "Manchester Mark 1", "EDSAC"],
                correct: 1,
                explanation: "L'EDVAC (Electronic Discret VAriable Computer) de 1947 fut le premier calculateur à programme enregistré basé sur l'architecture de von Neumann."
            },
            {
                type: 'qcm',
                question: "Quelle était la principale méthode de programmation de l'ENIAC avant l'invention du programme enregistré ?",
                options: [
                    "Par cartes perforées",

                    "Par langage machine"
                ],
                correct: 1,
                explanation: "Avant le programme enregistré, l'ENIAC était programmé en effectuant des connexions physiques (câbles) entre les composants et en positionnant manuellement des commutateurs."
            },
            {
                type: 'qcm',
                question: "Dans la typologie historique des ordinateurs, comment appelait-on les ordinateurs 'plus petits, moins coûteux et conçus pour le labo' apparus à la fin des années 60 ?",
                options: ["Micro-ordinateurs", "Mini-ordinateurs", "Serveurs", "Stations de travail"],
                correct: 1,
                explanation: "Les mini-ordinateurs sont apparus à la fin des années 60 comme des machines plus petites, moins coûteuses et conçues pour les laboratoires et petits services."
            },
            {
                type: 'qcm',
                question: "Quel est l'avantage principal du 'programme enregistré' de von Neumann ?",
                options: [
                    "Permettre l'utilisation de câbles",
                    "Stocker le programme pour le réutiliser sans tout récrire",
                    "Augmenter la vitesse de calcul",
                    "Réduire la consommation électrique"
                ],
                correct: 1,
                explanation: "L'avantage principal du programme enregistré est qu'on peut stocker le programme en mémoire pour le réutiliser sans avoir à refaire toutes les connexions physiques."
            },
            {
                type: 'qcm',
                question: "Quel ordinateur de 1948 fut le premier à disposer d'une unité de commande interne et à suivre un programme enregistré ?",
                options: ["ENIAC", "EDVAC", "Manchester Mark 1", "IBM SSEC"],
                correct: 2,
                explanation: "Le Manchester Mark 1 (ou Ferranti Mark I) de 1948 fut le premier prototype à disposer d'une unité de commande interne et à suivre un programme enregistré."
            },

            // QRM
            {
                type: 'qrm',
                question: "Quels sont les avantages de l'assembleur par rapport au code machine ? (Plusieurs réponses possibles)",
                options: [
                    "Gain en compréhension grâce aux expressions symboliques",
                    "Le plus rapide à l'exécution",
                    "Portable sur différentes machines",
                    "Nécessite moins d'instructions"
                ],
                correct: [0, 1],
                explanation: "L'assembleur offre un gain en compréhension grâce aux expressions symboliques (ex: ADD au lieu d'un code numérique) et reste le plus rapide à l'exécution. Cependant, il n'est PAS portable et nécessite beaucoup d'instructions."
            },
            {
                type: 'qrm',
                question: "Quels langages sont des exemples de langages INTERPRÉTÉS ? (Plusieurs réponses possibles)",
                options: ["Python", "C", "PHP", "Perl", "Java", "Basic"],
                correct: [0, 2, 3, 5],
                explanation: "Python, PHP, Perl et Basic sont des langages interprétés qui exécutent les instructions au fur et à mesure via un interpréteur, sans étape de compilation préalable."
            },
            {
                type: 'qrm',
                question: "Quels sont les inconvénients de l'assembleur ? (Plusieurs réponses possibles)",
                options: [
                    "Instructions peu puissantes nécessitant beaucoup de code",
                    "Instructions spécifiques à un modèle de processeur",
                    "Lent à l'exécution",
                    "Difficile à comprendre"
                ],
                correct: [0, 1],
                explanation: "L'assembleur a pour inconvénients d'avoir des instructions peu puissantes (nécessitant beaucoup de code) et d'être spécifique à un modèle de processeur (pas de portabilité)."
            },
            {
                type: 'qrm',
                question: "Selon la typologie historique moderne, quelles sont les 5 parties de l'univers informatique aujourd'hui ? (Plusieurs réponses possibles)",
                options: [
                    "Super calculateurs",
                    "Mainframes",
                    "Gros systèmes",
                    "Serveurs",
                    "Micro-ordinateurs",
                    "Mini-ordinateurs",
                    "Nouveaux périphériques intelligents"
                ],
                correct: [0, 2, 3, 4, 6],
                explanation: "Les 5 parties sont : Super calculateurs, Gros systèmes, Serveurs, Micro-ordinateurs et Nouveaux périphériques intelligents (PABX, GSM, smartphones, etc.)."
            },
            {
                type: 'qrm',
                question: "Quelles sont les caractéristiques de l'ENIAC ? (Plusieurs réponses possibles)",
                options: [
                    "Pesait 30 tonnes",
                    "Composé de 17 468 tubes",
                    "Consommait environ 200 kilowatts",
                    "Programmé par programme enregistré",
                    "Créé en 1943",
                    "Occupait 23 m³"
                ],
                correct: [0, 1, 2, 5],
                explanation: "L'ENIAC pesait 30 tonnes, était composé de 17 468 tubes, consommait ~200 kW et occupait 23 m³. Il fut créé en 1946 (pas 1943) et était programmé par câbles (pas par programme enregistré)."
            },
            {
                type: 'qrm',
                question: "Quels sont les avantages d'un langage COMPILÉ ? (Plusieurs réponses possibles)",
                options: [
                    "Gain en portabilité",
                    "Plus rapide à l'exécution que l'interprété",
                    "Pas de délai de compilation",
                    "Le code source est facilement modifiable"
                ],
                correct: [0, 1],
                explanation: "Un langage compilé offre un gain en portabilité (on peut le porter sur différentes machines avec un compilateur adapté) et est plus rapide à l'exécution qu'un langage interprété."
            },

            // Fill in the blank
            {
                type: 'fill',
                question: "Le mathématicien _______ a été le premier à décrire la notion de programme enregistré.",
                answer: ["von neumann", "von Neumann", "neumann", "Neumann", "john von neumann"],
                explanation: "John von Neumann a été le premier à décrire le concept de programme enregistré, où les instructions sont stockées en mémoire sous forme de codes numériques."
            },
            {
                type: 'fill',
                question: "L'ENIAC a été créé en _______ par John W. Mauchly et Prosper Eckert.",
                answer: ["1946"],
                explanation: "L'ENIAC (Electronic Numerical Integrator And Computer) a été créé en 1946 à l'Université de Pennsylvanie."
            },
            {
                type: 'fill',
                question: "Un _______ prend en entrée un fichier texte contenant le code source pour produire un fichier exécutable.",
                answer: ["compilateur", "Compilateur"],
                explanation: "Un compilateur traduit le code source écrit en langage évolué vers un fichier exécutable formé de codes numériques propres à la machine."
            },
            {
                type: 'fill',
                question: "Un _______ exécute les instructions au fur et à mesure sans étape de compilation préalable.",
                answer: ["interpréteur", "Interpréteur", "interpreteur", "Interpreteur"],
                explanation: "Un interpréteur exécute les instructions ligne par ligne en simulant leur exécution, sans passer par une étape de compilation."
            },
            {
                type: 'fill',
                question: "L'_______ est le langage de programmation le plus proche de la machine et le plus rapide à l'exécution.",
                answer: ["assembleur", "Assembleur"],
                explanation: "L'assembleur utilise des expressions symboliques qui correspondent directement aux instructions machine, ce qui en fait le langage le plus rapide."
            },
            {
                type: 'fill',
                question: "L'EDVAC de 1947 est le premier calculateur à _______ _______.",
                answer: ["programme enregistré", "programme enregistre"],
                explanation: "L'EDVAC (Electronic Discret VAriable Computer) fut le premier calculateur à implémenter le concept de programme enregistré de von Neumann."
            },
            {
                type: 'fill',
                question: "Avant le programme enregistré, l'ENIAC était programmé par connexions _______ (câbles).",
                answer: ["physiques", "Physiques"],
                explanation: "La programmation de l'ENIAC se faisait en effectuant des connexions physiques (câbles) entre les composants et en positionnant manuellement des commutateurs."
            },
            {
                type: 'fill',
                question: "Dans un langage compilé, le gain en _______ permet de porter facilement le programme sur une autre machine.",
                answer: ["portabilité", "Portabilité", "portabilite", "Portabilite"],
                explanation: "Le gain en portabilité signifie qu'on peut facilement porter le programme sur une autre machine à condition de disposer d'un compilateur adapté pour cette machine."
            },
            {
                type: 'fill',
                question: "Les _______ sont des ordinateurs 'plus petits et moins coûteux' apparus à la fin des années 60.",
                answer: ["mini-ordinateurs", "mini ordinateurs", "minis"],
                explanation: "Les mini-ordinateurs sont apparus à la fin des années 60 comme une alternative plus petite et moins coûteuse aux gros systèmes."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answeredQuestions = 0;
        let shuffledQuestions = [];
        let userAnswers = [];

        /**
         * Mélange un tableau de manière aléatoire (algorithme Fisher-Yates)
         * @param {Array} array - Le tableau à mélanger
         * @returns {Array} Le tableau mélangé
         */
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        /**
         * Initialise le quiz en mélangeant les questions
         */
        function initQuiz() {
            shuffledQuestions = shuffleArray(questionsBank);
            currentQuestionIndex = 0;
            score = 0;
            answeredQuestions = 0;
            userAnswers = new Array(shuffledQuestions.length).fill(null);
            
            document.getElementById('total-questions').textContent = shuffledQuestions.length;
            updateProgress();
            displayQuestion();
        }

        /**
         * Affiche la question actuelle
         */
        function displayQuestion() {
            const question = shuffledQuestions[currentQuestionIndex];
            const container = document.getElementById('quiz-container');
            
            let optionsHTML = '';
            
            if (question.type === 'qcm' || question.type === 'qrm') {
                optionsHTML = '<div class="options">';
                question.options.forEach((option, index) => {
                    const isSelected = userAnswers[currentQuestionIndex]?.includes(index);
                    optionsHTML += `
                        <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${index})">
                            ${option}
                        </div>
                    `;
                });
                optionsHTML += '</div>';
            } else if (question.type === 'fill') {
                const userAnswer = userAnswers[currentQuestionIndex] || '';
                optionsHTML = `
                    <input 
                        type="text" 
                        class="fill-blank-input" 
                        id="fill-input"
                        placeholder="Entrez votre réponse..."
                        value="${userAnswer}"
                        onkeyup="handleFillInput(event)"
                    >
                `;
            }
            
            const typeLabel = question.type === 'qcm' ? 'QCM' : question.type === 'qrm' ? 'QRM' : 'Texte à trou';
            
            container.innerHTML = `
                <div class="question-card">
                    <div class="question-header">
                        <div class="question-number">Question ${currentQuestionIndex + 1}</div>
                        <div class="question-type">${typeLabel}</div>
                    </div>
                    <div class="question-text">${question.question}</div>
                    ${optionsHTML}
                    <div class="explanation" id="explanation">
                        <div class="explanation-title">💡 Explication</div>
                        <div class="explanation-text">${question.explanation}</div>
                    </div>
                </div>
                <div class="buttons-container">
                    ${currentQuestionIndex > 0 ? '<button class="btn btn-secondary" onclick="previousQuestion()">Précédent</button>' : ''}
                    ${currentQuestionIndex < shuffledQuestions.length - 1 
                        ? '<button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>Valider & Suivant</button>'
                        : '<button class="btn btn-primary" id="next-btn" onclick="finishQuiz()" disabled>Valider & Terminer</button>'
                    }
                </div>
            `;

            // Auto-enable next button if question was already answered
            if (userAnswers[currentQuestionIndex] !== null) {
                document.getElementById('next-btn').disabled = false;
            }
        }

        /**
         * Sélectionne une option (pour QCM et QRM)
         * @param {number} index - L'index de l'option sélectionnée
         */
        function selectOption(index) {
            const question = shuffledQuestions[currentQuestionIndex];
            
            if (question.type === 'qcm') {
                userAnswers[currentQuestionIndex] = [index];
                // Update visual
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.toggle('selected', i === index);
                });
            } else if (question.type === 'qrm') {
                if (!userAnswers[currentQuestionIndex]) {
                    userAnswers[currentQuestionIndex] = [];
                }
                const answers = userAnswers[currentQuestionIndex];
                const idx = answers.indexOf(index);
                if (idx > -1) {
                    answers.splice(idx, 1);
                } else {
                    answers.push(index);
                }
                // Update visual
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.toggle('selected', answers.includes(i));
                });
            }
            
            // Enable next button
            document.getElementById('next-btn').disabled = false;
        }

        /**
         * Gère l'input pour les questions à trous
         * @param {Event} event - L'événement clavier
         */
        function handleFillInput(event) {
            const value = event.target.value.trim();
            userAnswers[currentQuestionIndex] = value;
            document.getElementById('next-btn').disabled = value === '';
        }

        /**
         * Valide la réponse actuelle et affiche le feedback
         */
        function validateAnswer() {
            const question = shuffledQuestions[currentQuestionIndex];
            const userAnswer = userAnswers[currentQuestionIndex];
            let isCorrect = false;

            if (question.type === 'qcm') {
                isCorrect = userAnswer[0] === question.correct;
                // Show correct/incorrect
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.add('disabled');
                    if (i === question.correct) {
                        opt.classList.add('correct');
                    } else if (userAnswer.includes(i)) {
                        opt.classList.add('incorrect');
                    }
                });
            } else if (question.type === 'qrm') {
                const sortedUser = [...userAnswer].sort();
                const sortedCorrect = [...question.correct].sort();
                isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
                // Show correct/incorrect
                document.querySelectorAll('.option').forEach((opt, i) => {
                    opt.classList.add('disabled');
                    if (question.correct.includes(i)) {
                        opt.classList.add('correct');
                    } else if (userAnswer.includes(i)) {
                        opt.classList.add('incorrect');
                    }
                });
            } else if (question.type === 'fill') {
                const normalizedUser = userAnswer.toLowerCase().trim();
                isCorrect = question.answer.some(ans => ans.toLowerCase() === normalizedUser);
                const input = document.getElementById('fill-input');
                input.disabled = true;
                if (isCorrect) {
                    input.classList.add('correct');
                } else {
                    input.classList.add('incorrect');
                }
            }

            if (isCorrect) {
                score++;
            }
            answeredQuestions++;

            // Show explanation
            document.getElementById('explanation').classList.add('show');
            
            // Update score display
            updateProgress();
        }

        /**
         * Passe à la question suivante
         */
                        function nextQuestion() {
            if (userAnswers[currentQuestionIndex] === null) {
                alert("Veuillez répondre à la question avant de continuer.");
                return;
            }
            
            // Si pas encore validé, valider d'abord
            if (!document.getElementById('explanation').classList.contains('show')) {
                validateAnswer();
                return; // Ne pas passer à la question suivante tout de suite
            }
            
            // Sinon, passer à la question suivante
            currentQuestionIndex++;
            displayQuestion();
            updateProgress();
        }

        
        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
                updateProgress();
            }
        }

        /**
         * Termine le quiz et affiche les résultats
         */
        function finishQuiz() {
            if (userAnswers[currentQuestionIndex] === null) return;
            validateAnswer();
            showResults();
        }

        function showResults() {
            const percentage = Math.round((score / shuffledQuestions.length) * 100);
            const xpEarned = score * 10;
            
            // Save progress
            const progress = JSON.parse(localStorage.getItem('t1011-quiz-progress') || '{}');
            if (!progress.chapter1 || percentage > (progress.chapter1.score || 0)) {
                progress.chapter1 = {
                    completed: percentage >= 60,
                    score: percentage,
                    xp: xpEarned,
                    date: new Date().toISOString()
                };
                localStorage.setItem('t1011-quiz-progress', JSON.stringify(progress));
            }

            // Update UI
            document.getElementById('quiz-container').classList.add('hidden');
            document.querySelector('.progress-container').classList.add('hidden');
            
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.classList.add('show');
            
            // Set icon and message based on score
            let icon = '🎉';
            let title = 'Quiz terminé !';
            let message = 'Excellent travail !';
            
            if (percentage >= 90) {
                icon = '🏆';
                title = 'Parfait !';
                message = 'Score exceptionnel ! Tu maîtrises parfaitement ce chapitre !';
            } else if (percentage >= 75) {
                icon = '🎉';
                title = 'Très bien !';
                message = 'Excellent score ! Continue comme ça !';
            } else if (percentage >= 60) {
                icon = '✅';
                title = 'Bien joué !';
                message = 'Bon score ! Révise encore un peu pour viser l\'excellence.';
            } else {
                icon = '📚';
                title = 'Chapitre non validé';
                message = 'Il faut 60% pour valider. Révise le cours et réessaye !';
            }
            
            document.getElementById('results-icon').textContent = icon;
            document.getElementById('results-title').textContent = title;
            document.getElementById('results-message').textContent = message;
            document.getElementById('final-score').textContent = percentage + '%';
            document.getElementById('correct-answers').textContent = score;
            document.getElementById('incorrect-answers').textContent = (shuffledQuestions.length - score);
            document.getElementById('xp-earned').textContent = xpEarned;
        }

        /**
         * Met à jour la barre de progression et le score
         */
        function updateProgress() {
            const percentage = Math.round((score / shuffledQuestions.length) * 100);
            const progressPercentage = Math.round(((currentQuestionIndex + 1) / shuffledQuestions.length) * 100);
            
            document.getElementById('current-question').textContent = currentQuestionIndex + 1;
            document.getElementById('current-score').textContent = percentage + '%';
            document.getElementById('progress-percentage').textContent = progressPercentage + '%';
            document.getElementById('progress-bar').style.width = progressPercentage + '%';
        }

        /**
         * Redémarre le quiz
         */
        function restartQuiz() {
            document.getElementById('results-container').classList.remove('show');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.querySelector('.progress-container').classList.remove('hidden');
            initQuiz();
        }

        // Initialisation au chargement de la page
        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
