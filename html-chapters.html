    <style>
        /* ========== PREMIUM CSS - T1131 QUEST ========== */
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-card: rgba(39, 39, 42, 0.6);
            --border: rgba(63, 63, 70, 0.5);
            --border-hover: rgba(113, 113, 122, 0.6);
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
            --accent-3: #06b6d4;
            --success: #22c55e;
            --success-dark: #16a34a;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --shadow-glow: 0 0 60px -15px rgba(139, 92, 246, 0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.12), transparent),
                radial-gradient(ellipse 60% 50% at 100% 50%, rgba(139, 92, 246, 0.08), transparent),
                radial-gradient(ellipse 60% 50% at 0% 100%, rgba(6, 182, 212, 0.06), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* Noise overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 28px;
            position: relative;
            z-index: 1;
        }

        /* ========== HEADER ========== */
        .header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px 32px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
            transform: translateX(-3px);
        }

        .header-title h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-stats {
            display: flex;
            gap: 24px;
        }

        .stat-box {
            text-align: center;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ========== MAIN VIEW - CHAPTERS GRID ========== */
        .main-view { display: block; }
        .hidden { display: none !important; }

        .chapters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .chapter-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .chapter-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .chapter-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 12px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .chapter-card:hover::before {
            opacity: 1;
        }

        .chapter-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chapter-card.locked:hover {
            transform: none;
        }

        .chapter-card.completed {
            border-color: var(--success);
        }

        .chapter-card.completed::before {
            background: linear-gradient(90deg, var(--success), var(--accent-3));
            opacity: 1;
        }

        .chapter-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .chapter-number {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chapter-status {
            font-size: 1.2rem;
        }

        .chapter-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .chapter-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .chapter-xp {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-2);
        }

        /* ========== CHAPTER VIEW ========== */
        .chapter-view { display: block; }

        .chapter-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .nav-btn {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .nav-btn.active {
            background: var(--gradient-primary);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        /* ========== THEORY SECTION ========== */
        .theory-content {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 24px;
        }

        .theory-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .theory-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 24px 0 12px;
            color: var(--accent-1);
        }

        .theory-content p {
            margin-bottom: 16px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .theory-content ul, .theory-content ol {
            margin: 16px 0;
            padding-left: 24px;
            color: var(--text-secondary);
        }

        .theory-content li {
            margin-bottom: 8px;
        }

        .theory-content code {
            background: var(--bg-secondary);
            padding: 3px 8px;
            border-radius: 6px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
            color: var(--accent-3);
            border: 1px solid var(--border);
        }

        .theory-content pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .theory-content pre code {
            background: none;
            padding: 0;
            border: none;
            color: var(--text-primary);
        }

        /* ========== QUIZ SECTION ========== */
        .quiz-container {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
        }

        .quiz-progress {
            margin-bottom: 24px;
        }

        .quiz-progress-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 100px;
            overflow: hidden;
        }

        .quiz-progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 100px;
            transition: width 0.4s ease;
        }

        .quiz-question {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-option {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .quiz-option:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .quiz-option.selected {
            border-color: var(--accent-1);
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .quiz-option.correct {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .quiz-option.incorrect {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* ========== EXERCISES SECTION ========== */
        .exercise-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 20px;
        }

        .exercise-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .exercise-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .exercise-desc code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
            color: var(--accent-3);
        }

        /* ========== CODE EDITOR ========== */
        .code-editor {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }

        .editor-header span {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .run-btn {
            padding: 8px 16px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .cm-editor-wrapper {
            min-height: 200px;
        }

        .CodeMirror {
            height: 300px;
            border-radius: 0 0 8px 8px;
            font-family: 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .CodeMirror-scroll {
            min-height: 300px;
        }

        /* ========== OUTPUT SECTION ========== */
        .output-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .output-header {
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .code-output {
            padding: 16px;
            min-height: 80px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: var(--success);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .code-output.error {
            color: var(--danger);
        }

        /* ========== VALIDATION MESSAGES ========== */
        .validation {
            padding: 16px 20px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .validation.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .validation.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .validation code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
            color: var(--accent-3);
        }

        /* ========== BUTTONS ========== */
        .btn-primary {
            padding: 14px 28px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
        }

        .btn-secondary {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header-stats { width: 100%; justify-content: space-around; }
            .chapters-grid { grid-template-columns: 1fr; }
            .chapter-nav { flex-direction: column; }
        }
    </style>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  /* ── Accents ── */

  --blue-bd:     #bfdbfe;

  --purple-bg:   #f5f3ff;
  --teal:        #0891b2;

  --teal-bd:     #a5f3fc;

  --green-bg:    #f0fdf4;
  --green-bd:    #bbf7d0;
  --orange:      #d97706;

  --orange-bd:   #fde68a;

  /* ── Radius ── */

}

  /* ── Accents tuned for navy backgrounds ── */

  --blue-bg:     #1a2744;   /* navy-tinted blue bg */
  --blue-bd:     #2c4a7c;   /* blue border */
  --purple:      #b794f4;   /* soft purple */
  --purple-bg:   #1e1a3a;
  --teal:        #4fd1c5;   /* teal — pops on navy */
  --teal-bg:     #0e2a2e;
  --teal-bd:     #1a4a50;
  --green:       #68d391;   /* mint green */
  --green-bg:    #0e2a1a;
  --green-bd:    #1a4a2e;
  --orange:      #f6ad55;   /* warm amber */
  --orange-bg:   #2a1e0e;
  --orange-bd:   #4a3418;
  --red:         #fc8181;   /* soft red */
  --red-bg:      #2a1414;
  --red-bd:      #4a2020;
  --yellow:      #f6e05e;
  --yellow-bg:   #2a2400;

  --shadow-sm:   0 1px 4px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
  --shadow:      0 4px 20px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);

<script>
(function(){

  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', function(){
    const lbl = document.querySelector('#theme-toggle .t-label');
    const icon = document.querySelector('#theme-toggle .t-icon');
    const t = document.documentElement.getAttribute('data-theme');
    if(lbl) lbl.textContent = t === 'dark' ? 'Clair' : 'Sombre';
    if(icon) icon.textContent = t === 'dark' ? '🌙' : '☀️';
  });
})();
function toggleTheme(){
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  const lbl = document.querySelector('#theme-toggle .t-label');
  const icon = document.querySelector('#theme-toggle .t-icon');
  if(lbl) lbl.textContent = next === 'dark' ? 'Clair' : 'Sombre';
  if(icon) icon.textContent = next === 'dark' ? '🌙' : '☀️';
}

            if (alreadyDone) return;
            
            const allProgress = JSON.parse(localStorage.getItem('t1131-quest-progress') || '{}');
            
            // Pré-valider HTML01 et HTML02
            const chaptersToValidate = ['html01', 'html02'];
            
            for (let id of chaptersToValidate) {
                if (!allProgress[id] || !allProgress[id].completed) {
                    allProgress[id] = {
                        completed: true,
                        xp: CHAPTERS[id].xp
                    };
                }
                
                // Valider tous les exercices
                if (!allProgress.validatedExercises) {
                    allProgress.validatedExercises = {};
                }
                const exCount = CHAPTERS[id].exercises ? CHAPTERS[id].exercises.length : 0;
                allProgress.validatedExercises[id] = [];
                for (let i = 0; i < exCount; i++) {
                    allProgress.validatedExercises[id].push(i);
                }
                
                // Valider le quiz avec XP max
                if (!allProgress.quizXP) {
                    allProgress.quizXP = {};
                }
                const quizCount = CHAPTERS[id].quiz ? CHAPTERS[id].quiz.length : 0;
                allProgress.quizXP[id] = quizCount * 10;

            globalState.quizXP = allProgress.quizXP || {};
            
            for (let id in allProgress) {
                if (id.startsWith('html') && allProgress[id].completed) {
                    globalState.completedChapters.push(id);
                    globalState.totalXP += allProgress[id].xp || 0;
                }
            }
            
            // Ajouter les XP des exercices validés
            for (let chapterId in globalState.validatedExercises) {
                if (chapterId.startsWith('html')) {
                    globalState.totalXP += globalState.validatedExercises[chapterId].length * 15;
                }
            }
            
            // Ajouter les XP des quiz
            for (let chapterId in globalState.quizXP) {
                if (chapterId.startsWith('html')) {
                    globalState.totalXP += globalState.quizXP[chapterId] || 0;
                }
            }
        }

            }
            
            allProgress.validatedExercises = globalState.validatedExercises;
            allProgress.quizXP = globalState.quizXP;
            
            localStorage.setItem('t1131-quest-progress', JSON.stringify(allProgress));

        /**
         * Sauvegarde le code d'un exercice dans localStorage
         */
        function saveCode(chapterId, exerciseId, code) {
            const savedCodes = JSON.parse(localStorage.getItem('t1131-saved-codes') || '{}');
            if (!savedCodes[chapterId]) {
                savedCodes[chapterId] = {};
            }
            savedCodes[chapterId][exerciseId] = code;
            localStorage.setItem('t1131-saved-codes', JSON.stringify(savedCodes));
        }
        
        /**
         * Récupère le code sauvegardé d'un exercice
         */
        function getSavedCode(chapterId, exerciseId) {
            const savedCodes = JSON.parse(localStorage.getItem('t1131-saved-codes') || '{}');
            return savedCodes[chapterId] ? savedCodes[chapterId][exerciseId] : null;
        }

        function openChapter(id) {
            globalState.currentChapter = id;
            
            // Vérifier la progression existante
            const quizDone = globalState.quizXP[id] > 0;
            const exercisesValidated = (globalState.validatedExercises[id] || []).length;
            const chapter = CHAPTERS[id];
            const totalExercises = chapter.exercises ? chapter.exercises.length : 0;
            const isCompleted = globalState.completedChapters.includes(id);
            
            // Si progression existante, proposer un choix
            if (quizDone || exercisesValidated > 0) {
                let message = `📊 Progression détectée pour ${chapter.title} :\n\n`;
                if (quizDone) message += `✅ Quiz complété\n`;
                if (exercisesValidated > 0) message += `✅ ${exercisesValidated}/${totalExercises} exercices validés\n`;
                if (isCompleted) message += `✅ Chapitre terminé\n`;
                
                message += `\nQue veux-tu faire ?\n\n`;
                message += `➡️ OK = Reprendre où tu en étais\n`;
                message += `❌ Annuler = Recommencer à zéro`;
                
                const continueProgress = confirm(message);
                
                if (!continueProgress) {
                    // Recommencer à zéro
                    delete globalState.quizXP[id];
                    delete globalState.validatedExercises[id];
                    saveProgress();
                    globalState.currentSection = 'theory';
                    globalState.quizScore = 0;
                    globalState.quizAnswered = 0;
                } else {
                    // Reprendre - aller directement à la bonne section
                    if (quizDone && exercisesValidated < totalExercises) {
                        globalState.currentSection = 'exercises';
                    } else if (quizDone && exercisesValidated >= totalExercises) {
                        globalState.currentSection = 'project';
                    } else {
                        globalState.currentSection = 'theory';
                    }
                    globalState.quizScore = 0;
                    globalState.quizAnswered = 0;
                }
            } else {
                globalState.currentSection = 'theory';
                globalState.quizScore = 0;
                globalState.quizAnswered = 0;
            }
            
            document.getElementById('main-view').classList.add('hidden');
            renderChapterView();
            document.getElementById('chapter-view').classList.remove('hidden');
            
            // Afficher directement la bonne section selon la progression
            if (globalState.currentSection === 'exercises') {
                document.getElementById('theory-section').classList.add('hidden');
                startExercises();
            } else if (globalState.currentSection === 'project') {
                document.getElementById('theory-section').classList.add('hidden');
                startProject();
            }
            
            window.scrollTo(0, 0);
        }

        function answerQuiz(qIndex, answer, correct) {
            const qDiv = document.querySelector(`[data-index="${qIndex}"]`);
            const opts = qDiv.querySelectorAll('.quiz-option');
            const feedback = qDiv.querySelector('.quiz-feedback');
            
            opts.forEach(b => b.disabled = true);
            
            const isCorrect = answer === correct;
            if (isCorrect) {
                opts[answer].classList.add('correct');
                feedback.textContent = '✅ Correct !';
                feedback.classList.add('correct');
                globalState.quizScore++;
            } else {
                opts[answer].classList.add('wrong');
                opts[correct].classList.add('correct');
                feedback.textContent = '❌ Incorrect';
                feedback.classList.add('wrong');
            }
            
            feedback.classList.remove('hidden');
            globalState.quizAnswered++;
            
            const ch = CHAPTERS[globalState.currentChapter];
            setTimeout(() => {
                if (globalState.quizAnswered < ch.quiz.length) {
                    qDiv.classList.add('hidden');
                    document.querySelector(`[data-index="${qIndex+1}"]`).classList.remove('hidden');
                    window.scrollTo(0, 0);
                } else {
                    showQuizResults();
                }
            }, 2000);
        }

        // Stockage des instances CodeMirror

        /**
         * Crée une instance CodeMirror pour HTML
         * @param {string} textareaId - L'id du textarea
         * @return {object} L'instance CodeMirror créée
         */
        function createCodeMirrorEditor(textareaId) {
            const textarea = document.getElementById(textareaId);
            if (!textarea) { return null; }
            
            const editor = CodeMirror.fromTextArea(textarea, {
                mode: 'htmlmixed',
                theme: 'material-darker',
                lineNumbers: true,
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchTags: {bothTags: true},
                styleActiveLine: true,
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: false,
                scrollbarStyle: 'native',
                extraKeys: {
                    'Tab': function(cm) { cm.replaceSelection('    ', 'end'); }
                }
            });
            editor.setSize('100%', 300);
            return editor;
        }

        function updateExerciseProgress() {
            const ch = CHAPTERS[globalState.currentChapter];
            const chapterId = globalState.currentChapter;
            const validatedExercises = globalState.validatedExercises[chapterId] || [];
            const totalExercises = ch.exercises.length;

            const progressBar = document.getElementById('ex-progress-bar');

        function runExercise(i) {
            const ch = CHAPTERS[globalState.currentChapter];
            const chapterId = globalState.currentChapter;
            const editor = cmEditors[`code-${i}`];
            const code = editor ? editor.getValue() : document.getElementById(`code-${i}`).value;
            const output = document.getElementById(`output-${i}`);
            const validation = document.getElementById(`validation-${i}`);
            
            // Sauvegarder le code
            saveCode(chapterId, `ex-${i}`, code);
            
            output.textContent = '';
            output.classList.remove('error');
            validation.classList.add('hidden');
            validation.classList.remove('success', 'error');
            
            if (!code.trim()) {
                output.textContent = '❌ Écris du code HTML !';
                output.classList.add('error');
                return;
            }
            
            // Validation avec feedback détaillé
            const exercise = ch.exercises[i];
            const validationResult = validateHTMLWithFeedback(code, exercise);
            
            if (validationResult.success) {
                if (!globalState.validatedExercises[chapterId]) {
                    globalState.validatedExercises[chapterId] = [];
                }
                
                const alreadyValidated = globalState.validatedExercises[chapterId].includes(i);
                
                if (!alreadyValidated) {
                    globalState.validatedExercises[chapterId].push(i);
                    globalState.totalXP += 15;
                    validation.innerHTML = '✅ <strong>Parfait !</strong> (+15 XP)';
                    saveProgress();
                    updateExerciseProgress();
                    
                    const exCard = document.getElementById(`ex-${i}`);
                    if (exCard) {
                        exCard.style.borderLeftColor = 'var(--success)';
                    }
                } else {
                    validation.innerHTML = '✅ <strong>Exercice déjà validé !</strong>';
                }
                validation.classList.add('success');
                output.innerHTML = '<span style="color: var(--success)">✓ Code HTML valide !</span>';
                updateHeader();
            } else {
                validation.innerHTML = validationResult.message;
                validation.classList.add('error');
                output.innerHTML = '<span style="color: var(--danger)">✗ Vérifie ton code</span>';
            }
            validation.classList.remove('hidden');
        }
        
        /**
         * Valide le HTML avec messages détaillés
         */
        function validateHTMLWithFeedback(code, exercise) {
            if (exercise.validate && exercise.validate(code)) {
                return { success: true, message: '' };
            }
            
            const hints = [];
            const desc = exercise.desc.toLowerCase();
            const codeLower = code.toLowerCase();
            
            // Vérifications HTML communes
            if (code.includes('<') && !code.includes('>')) {
                hints.push('Tu as ouvert une balise <code>&lt;</code> mais tu n\'as pas fermé avec <code>&gt;</code>');
            }
            
            // Vérifications de balises manquantes basées sur la description
            if (desc.includes('<h1>') && !codeLower.includes('<h1')) {
                hints.push('Utilise la balise <code>&lt;h1&gt;</code> pour le titre principal');
            }
            if (desc.includes('<p>') && !codeLower.includes('<p')) {
                hints.push('Utilise la balise <code>&lt;p&gt;</code> pour les paragraphes');
            }
            if (desc.includes('<a') && !codeLower.includes('<a')) {
                hints.push('Utilise la balise <code>&lt;a href="..."&gt;</code> pour les liens');
            }
            if (desc.includes('<img') && !codeLower.includes('<img')) {
                hints.push('Utilise la balise <code>&lt;img src="..." alt="..."&gt;</code> pour les images');
            }
            if (desc.includes('<ul') && !codeLower.includes('<ul')) {
                hints.push('Utilise <code>&lt;ul&gt;</code> pour une liste non ordonnée');
            }
            if (desc.includes('<ol') && !codeLower.includes('<ol')) {
                hints.push('Utilise <code>&lt;ol&gt;</code> pour une liste ordonnée');
            }
            if (desc.includes('<li') && !codeLower.includes('<li')) {
                hints.push('Utilise <code>&lt;li&gt;</code> pour les éléments de liste');
            }
            if (desc.includes('<table') && !codeLower.includes('<table')) {
                hints.push('Utilise <code>&lt;table&gt;</code> pour créer un tableau');
            }
            if (desc.includes('<form') && !codeLower.includes('<form')) {
                hints.push('Utilise <code>&lt;form&gt;</code> pour créer un formulaire');
            }
            if (desc.includes('<input') && !codeLower.includes('<input')) {
                hints.push('Utilise <code>&lt;input&gt;</code> pour les champs de saisie');
            }
            if (desc.includes('<div') && !codeLower.includes('<div')) {
                hints.push('Utilise <code>&lt;div&gt;</code> pour les conteneurs');
            }
            if (desc.includes('<span') && !codeLower.includes('<span')) {
                hints.push('Utilise <code>&lt;span&gt;</code> pour les éléments en ligne');
            }
            
            // Vérifier les attributs courants
            if (desc.includes('href') && !codeLower.includes('href')) {
                hints.push('N\'oublie pas l\'attribut <code>href</code> pour les liens');
            }
            if (desc.includes('src') && !codeLower.includes('src')) {
                hints.push('N\'oublie pas l\'attribut <code>src</code> pour la source');
            }
            if (desc.includes('alt') && !codeLower.includes('alt')) {
                hints.push('N\'oublie pas l\'attribut <code>alt</code> pour l\'accessibilité');
            }
            
            if (hints.length > 0) {
                const hintList = hints.map(h => `• ${h}`).join('<br>');
                return {
                    success: false,
                    message: `❌ <strong>Pas tout à fait...</strong><br><br>
                              <span style="color:#fbbf24">💡 Indices :</span><br>${hintList}<br><br>
                              <em style="color:#94a3b8">Relis bien les consignes.</em>`
                };
            }
            
            return {
                success: false,
                message: `❌ <strong>Résultat incorrect</strong><br><br>
                          <span style="color:#fbbf24">💡 Indice :</span> Vérifie les balises et attributs demandés.<br>
                          <em style="color:#94a3b8">Compare ton code avec les consignes.</em>`
            };
        }

        function startProject() {
            document.getElementById('exercises-section').classList.add('hidden');
            document.getElementById('project-section').classList.remove('hidden');
            
            const ch = CHAPTERS[globalState.currentChapter];
            const container = document.getElementById('project-container');
            
            container.innerHTML = `
                <div class="exercise-card">
                    <h3>${ch.project.title}</h3>
                    <div class="exercise-desc">${ch.project.desc}</div>
                    <div class="code-editor">
                        <div class="editor-header">
                            <span>📝 Éditeur HTML</span>
                            <button class="run-btn" onclick="runProject()">▶ Vérifier</button>
                        </div>
                        <div class="cm-editor-wrapper">
                            <textarea class="code-input" id="code-project"><!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
</head>
<body>
    
</body>
</html></textarea>
                        </div>
                    </div>
                    <div class="output-section">
                        <div class="output-header">✅ Validation</div>
                        <pre class="code-output" id="output-project"></pre>
                    </div>
                    <div class="validation hidden" id="validation-project"></div>
                    <button class="btn-success hidden" id="complete-btn" onclick="completeChapter()">
                        ✅ Terminer (+${ch.xp} XP)
                    </button>
                </div>
            `;
            
            // Initialiser CodeMirror pour le projet
            cmEditors['code-project'] = createCodeMirrorEditor('code-project');
            
            window.scrollTo(0, 0);
        }

        function runProject() {
            const ch = CHAPTERS[globalState.currentChapter];
            const editor = cmEditors['code-project'];
            const code = editor ? editor.getValue() : document.getElementById('code-project').value;
            const output = document.getElementById('output-project');
            const validation = document.getElementById('validation-project');
            const btn = document.getElementById('complete-btn');
            
            output.textContent = '';
            validation.classList.add('hidden');
            
            const isValid = ch.project.validate(code);
            if (isValid && !globalState.completedChapters.includes(globalState.currentChapter)) {
                validation.textContent = '✅ Projet réussi !';
                validation.classList.add('success');
                validation.classList.remove('hidden');
                btn.classList.remove('hidden');
                output.textContent = '✓ Code HTML valide !';
            } else if (isValid) {
                validation.textContent = '✅ Déjà validé !';
                validation.classList.add('success');
                validation.classList.remove('hidden');
                output.textContent = '✓ Chapitre déjà terminé';
            } else {
                validation.textContent = '❌ Vérifie toutes les consignes';
                validation.classList.add('error');
                validation.classList.remove('hidden');
                output.textContent = '✗ Relis les consignes du projet';
            }
        }

        function completeChapter() {
            const ch = CHAPTERS[globalState.currentChapter];
            
            if (!globalState.completedChapters.includes(globalState.currentChapter)) {
                globalState.completedChapters.push(globalState.currentChapter);
                globalState.totalXP += ch.xp;
                updateHeader();
                saveProgress();
                
                alert(`🎉 ${ch.title} terminé !\n\n+${ch.xp} XP\n\nXP Total : ${globalState.totalXP}`);
            }
            
            backToGrid();
        }

        window.onload = init;
    </script>
</body>
</html>
