<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T1131 Quest - Maîtrise JavaScript !</title>
    
    <!-- CodeMirror 5 - Éditeur professionnel style VS Code -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/lint.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/javascript-lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jshint/2.13.6/jshint.min.js"></script>
    
    <style>
        /* ========== PREMIUM CSS - T1131 QUEST ========== */
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-card: rgba(39, 39, 42, 0.6);
            --border: rgba(63, 63, 70, 0.5);
            --border-hover: rgba(113, 113, 122, 0.6);
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
            --accent-3: #06b6d4;
            --success: #22c55e;
            --success-dark: #16a34a;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --shadow-glow: 0 0 60px -15px rgba(139, 92, 246, 0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.12), transparent),
                radial-gradient(ellipse 60% 50% at 100% 50%, rgba(139, 92, 246, 0.08), transparent),
                radial-gradient(ellipse 60% 50% at 0% 100%, rgba(6, 182, 212, 0.06), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* Noise overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 28px;
            position: relative;
            z-index: 1;
        }

        /* ========== HEADER ========== */
        .header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px 32px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
            transform: translateX(-3px);
        }

        .header-title h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-stats {
            display: flex;
            gap: 24px;
        }

        .stat-box {
            text-align: center;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ========== MAIN VIEW - CHAPTERS GRID ========== */
        .main-view { display: block; }
        .hidden { display: none !important; }

        .chapters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .chapter-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .chapter-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .chapter-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: 0 12px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .chapter-card:hover::before {
            opacity: 1;
        }

        .chapter-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chapter-card.locked:hover {
            transform: none;
        }

        .chapter-card.completed {
            border-color: var(--success);
        }

        .chapter-card.completed::before {
            background: linear-gradient(90deg, var(--success), var(--accent-3));
            opacity: 1;
        }

        .chapter-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .chapter-number {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chapter-status {
            font-size: 1.2rem;
        }

        .chapter-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .chapter-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .chapter-xp {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-2);
        }

        /* ========== CHAPTER VIEW ========== */
        .chapter-view { display: block; }

        .chapter-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .nav-btn {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .nav-btn.active {
            background: var(--gradient-primary);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        /* ========== THEORY SECTION ========== */
        .theory-content {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 24px;
        }

        .theory-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .theory-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 24px 0 12px;
            color: var(--accent-1);
        }

        .theory-content p {
            margin-bottom: 16px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .theory-content ul, .theory-content ol {
            margin: 16px 0;
            padding-left: 24px;
            color: var(--text-secondary);
        }

        .theory-content li {
            margin-bottom: 8px;
        }

        .theory-content code {
            background: var(--bg-secondary);
            padding: 3px 8px;
            border-radius: 6px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.9em;
            color: var(--accent-3);
            border: 1px solid var(--border);
        }

        .theory-content pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .theory-content pre code {
            background: none;
            padding: 0;
            border: none;
            color: var(--text-primary);
        }

        /* ========== QUIZ SECTION ========== */
        .quiz-container {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
        }

        .quiz-progress {
            margin-bottom: 24px;
        }

        .quiz-progress-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 100px;
            overflow: hidden;
        }

        .quiz-progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 100px;
            transition: width 0.4s ease;
        }

        .quiz-question {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-option {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .quiz-option:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .quiz-option.selected {
            border-color: var(--accent-1);
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .quiz-option.correct {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }

        .quiz-option.incorrect {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* ========== EXERCISES SECTION ========== */
        .exercise-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 20px;
        }

        .exercise-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .exercise-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .exercise-desc code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
            color: var(--accent-3);
        }

        /* ========== CODE EDITOR ========== */
        .code-editor {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }

        .editor-header span {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .run-btn {
            padding: 8px 16px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .cm-editor-wrapper {
            min-height: 200px;
        }

        .CodeMirror {
            height: 300px;
            border-radius: 0 0 8px 8px;
            font-family: 'Fira Code', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .CodeMirror-scroll {
            min-height: 300px;
        }

        /* ========== OUTPUT SECTION ========== */
        .output-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .output-header {
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .code-output {
            padding: 16px;
            min-height: 80px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            color: var(--success);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .code-output.error {
            color: var(--danger);
        }

        /* ========== VALIDATION MESSAGES ========== */
        .validation {
            padding: 16px 20px;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .validation.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .validation.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .validation code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
            color: var(--accent-3);
        }

        /* ========== BUTTONS ========== */
        .btn-primary {
            padding: 14px 28px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
        }

        .btn-secondary {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header-stats { width: 100%; justify-content: space-around; }
            .chapters-grid { grid-template-columns: 1fr; }
            .chapter-nav { flex-direction: column; }
        }
        
        /* Zone de test DOM */
        .dom-test-zone {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            border: 2px solid #3b82f6;
            border-radius: 12px;
            margin: 15px 0;
            overflow: hidden;
        }
        .dom-test-header {
            background: #3b82f6;
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 14px;
        }
        .dom-test-content {
            padding: 15px;
            color: #e2e8f0;
        }
        .dom-test-content h2 {
            color: #60a5fa;
            margin: 0 0 10px 0;
        }
        .dom-test-content p {
            margin: 8px 0;
        }
        .dom-test-content button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px 0;
        }
        .dom-test-content button:hover {
            background: #2563eb;
        }
    </style>

<style id="theme-system">
/* ════════════════════════════════════════════
   SHARED DESIGN SYSTEM — light & dark
   ════════════════════════════════════════════ */
:root {
  /* ── Light (default) ── */
  --bg:          #f5f6fa;
  --surface:     #ffffff;
  --surface2:    #f0f1f7;
  --border:      #e2e4ef;
  --border2:     #c8cbdc;
  --text:        #111827;
  --text2:       #374151;
  --muted:       #6b7280;
  --dim:         #9ca3af;

  /* ── Accents ── */
  --blue:        #2563eb;
  --blue-bg:     #eff6ff;
  --blue-bd:     #bfdbfe;
  --purple:      #7c3aed;
  --purple-bg:   #f5f3ff;
  --teal:        #0891b2;
  --teal-bg:     #ecfeff;
  --teal-bd:     #a5f3fc;
  --green:       #16a34a;
  --green-bg:    #f0fdf4;
  --green-bd:    #bbf7d0;
  --orange:      #d97706;
  --orange-bg:   #fffbeb;
  --orange-bd:   #fde68a;
  --red:         #dc2626;
  --red-bg:      #fef2f2;
  --red-bd:      #fecaca;
  --yellow:      #ca8a04;
  --yellow-bg:   #fefce8;

  /* ── Shadows ── */
  --shadow-sm:   0 1px 3px rgba(0,0,0,.08);
  --shadow:      0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:   0 8px 32px rgba(0,0,0,.1);

  /* ── Radius ── */
  --r-sm: 8px;
  --r:    12px;
  --r-lg: 18px;
  --r-xl: 24px;
}

[data-theme="dark"] {
  /* ── Navy/slate blue-night palette ── */
  --bg:          #0d1117;   /* deep navy-black, like GitHub dark */
  --surface:     #161b22;   /* card surface — slate navy */
  --surface2:    #1c2333;   /* elevated elements */
  --border:      #2d3748;   /* slate border, visible but subtle */
  --border2:     #4a5568;   /* stronger border for hover/focus */
  --text:        #e2e8f0;   /* soft white, easy on eyes */
  --text2:       #a0aec0;   /* secondary text — slate-400 */
  --muted:       #718096;   /* muted — slate-500 */
  --dim:         #2d3748;   /* very dim — slate-700 */

  /* ── Accents tuned for navy backgrounds ── */

<button id="theme-toggle" onclick="toggleTheme()" aria-label="Changer le thème">

<script>
(function(){
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', function(){
    const lbl = document.querySelector('#theme-toggle .t-label');
    const icon = document.querySelector('#theme-toggle .t-icon');
    const t = document.documentElement.getAttribute('data-theme');
    if(lbl) lbl.textContent = t === 'dark' ? 'Clair' : 'Sombre';
    if(icon) icon.textContent = t === 'dark' ? '🌙' : '☀️';
  });
})();
function toggleTheme(){
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  const lbl = document.querySelector('#theme-toggle .t-label');
  const icon = document.querySelector('#theme-toggle .t-icon');
  if(lbl) lbl.textContent = next === 'dark' ? 'Clair' : 'Sombre';
  if(icon) icon.textContent = next === 'dark' ? '🌙' : '☀️';
}
</script>

        // ========== INITIALISATION ==========
        function init() {
            // Pré-valider JS01-JS04 pour Liam (une seule fois)
            preValidateFirstChapters();
            
            loadProgress();
            renderChaptersGrid();
            updateHeader();

        /**
         * Pré-valide les chapitres JS01-JS09
         * JS01-JS08 : tout validé (quiz + exercices + projet)
         * JS09 : seulement le QCM validé
         */
        function preValidateFirstChapters() {
            const alreadyDone = localStorage.getItem('t1131-preval-v6-done');
            if (alreadyDone) return;
            
            const allProgress = JSON.parse(localStorage.getItem('t1131-quest-progress') || '{}');
            
            if (!allProgress.validatedExercises) {
                allProgress.validatedExercises = {};
            }
            if (!allProgress.quizXP) {
                allProgress.quizXP = {};
            }
            
            // JS01 à JS08 : tout validé (quiz + exercices + projet)
            const fullValidation = ['js01', 'js02', 'js03', 'js04', 'js05', 'js06', 'js07', 'js08'];
            
            for (let id of fullValidation) {
                allProgress[id] = {
                    completed: true,
                    xp: CHAPTERS[id].xp
                };
                
                const exCount = CHAPTERS[id].exercises ? CHAPTERS[id].exercises.length : 0;
                allProgress.validatedExercises[id] = [];
                for (let i = 0; i < exCount; i++) {
                    allProgress.validatedExercises[id].push(i);
                }
                
                const quizCount = CHAPTERS[id].quiz ? CHAPTERS[id].quiz.length : 0;
                allProgress.quizXP[id] = quizCount * 10;
            }
            
            // JS09 : seulement le QCM validé (pas les exercices ni le projet)
            const js09QuizCount = CHAPTERS['js09'].quiz ? CHAPTERS['js09'].quiz.length : 0;
            allProgress.quizXP['js09'] = js09QuizCount * 10;
            
            localStorage.setItem('t1131-quest-progress', JSON.stringify(allProgress));
            localStorage.setItem('t1131-preval-v6-done', 'true');
            
            console.log('✅ JS01-JS08 complets, JS09 QCM seulement !');
        }

        // ========== SAUVEGARDE/CHARGEMENT ==========
        function loadProgress() {
            const allProgress = JSON.parse(localStorage.getItem('t1131-quest-progress') || '{}');
            globalState.totalXP = 0;
            globalState.completedChapters = [];
            globalState.validatedExercises = allProgress.validatedExercises || {};
            globalState.quizXP = allProgress.quizXP || {};
            
            // Charger les chapitres JS complétés
            for (let id in allProgress) {
                if (id.startsWith('js') && allProgress[id].completed) {
                    globalState.completedChapters.push(id);
                    globalState.totalXP += allProgress[id].xp || 0;
                }
            }
            
            // Ajouter les XP des exercices validés
            for (let chapterId in globalState.validatedExercises) {
                if (chapterId.startsWith('js')) {
                    globalState.totalXP += globalState.validatedExercises[chapterId].length * 15;
                }
            }
            
            // Ajouter les XP des quiz
            for (let chapterId in globalState.quizXP) {
                if (chapterId.startsWith('js')) {
                    globalState.totalXP += globalState.quizXP[chapterId] || 0;
                }
            }
        }

        function saveProgress() {
            const allProgress = JSON.parse(localStorage.getItem('t1131-quest-progress') || '{}');
            
            // Sauvegarder les chapitres complétés
            for (let id of globalState.completedChapters) {
                allProgress[id] = {
                    completed: true,
                    xp: CHAPTERS[id].xp
                };
            }
            
            // Sauvegarder les exercices validés et quiz XP
            allProgress.validatedExercises = globalState.validatedExercises;
            allProgress.quizXP = globalState.quizXP;
            
            localStorage.setItem('t1131-quest-progress', JSON.stringify(allProgress));
        }
        
        /**
         * Sauvegarde le code d'un exercice dans localStorage
         * @param {string} chapterId - L'ID du chapitre
         * @param {string} exerciseId - L'ID de l'exercice (ex-0, ex-1, project)
         * @param {string} code - Le code à sauvegarder
         */
        function saveCode(chapterId, exerciseId, code) {
            const savedCodes = JSON.parse(localStorage.getItem('t1131-saved-codes') || '{}');
            if (!savedCodes[chapterId]) {
                savedCodes[chapterId] = {};
            }
            savedCodes[chapterId][exerciseId] = code;
            localStorage.setItem('t1131-saved-codes', JSON.stringify(savedCodes));
        }
        
        /**
         * Récupère le code sauvegardé d'un exercice
         * @param {string} chapterId - L'ID du chapitre
         * @param {string} exerciseId - L'ID de l'exercice
         * @return {string|null} Le code sauvegardé ou null
         */
        function getSavedCode(chapterId, exerciseId) {
            const savedCodes = JSON.parse(localStorage.getItem('t1131-saved-codes') || '{}');
            return savedCodes[chapterId] ? savedCodes[chapterId][exerciseId] : null;
        }

        // ========== AFFICHAGE ==========
        function updateHeader() {
            document.getElementById('total-xp').textContent = globalState.totalXP;
            document.getElementById('level').textContent = calculateLevel(globalState.totalXP);
            document.getElementById('completed-count').textContent = globalState.completedChapters.length;
            
            // Calculer les statistiques globales
            let totalExercisesValidated = 0;
            let totalExercises = 0;
            let quizzesCompleted = 0;
            let projectsCompleted = globalState.completedChapters.length;
            
            for (let id in CHAPTERS) {
                const ch = CHAPTERS[id];
                totalExercisesValidated += (globalState.validatedExercises[id] || []).length;
                totalExercises += ch.exercises ? ch.exercises.length : 0;
                if (globalState.quizXP[id] > 0) quizzesCompleted++;
            }
            
            // Calculer la progression totale (14 chapitres * 100%)
            let totalProgress = 0;
            for (let id in CHAPTERS) {
                const ch = CHAPTERS[id];
                const exercisesValidated = (globalState.validatedExercises[id] || []).length;
                const totalEx = ch.exercises ? ch.exercises.length : 0;
                const quizDone = globalState.quizXP[id] > 0;
                const projectDone = globalState.completedChapters.includes(id);
                
                let chapterProgress = 0;
                if (quizDone) chapterProgress += 33;
                if (totalEx > 0) chapterProgress += Math.round((exercisesValidated / totalEx) * 33);
                if (projectDone) chapterProgress += 34;
                totalProgress += chapterProgress;
            }
            const totalPercent = Math.round(totalProgress / 14);
            
            // Mettre à jour l'affichage
            document.getElementById('stat-exercises').textContent = totalExercisesValidated;
            document.getElementById('stat-quizzes').textContent = quizzesCompleted;
            document.getElementById('stat-projects').textContent = projectsCompleted;
            document.getElementById('js-progress-text').textContent = totalPercent;
            document.getElementById('js-progress-bar').style.width = totalPercent + '%';
        }

        function calculateLevel(xp) {
            if (xp < 100) return 1;
            if (xp < 300) return 2;
            if (xp < 600) return 3;
            if (xp < 1000) return 4;
            if (xp < 1500) return 5;
            return Math.floor(xp / 300) + 1;
        }

        function renderChaptersGrid() {
            const container = document.getElementById('chapters-container');
            container.innerHTML = '';

            for (let id in CHAPTERS) {
                const ch = CHAPTERS[id];
                const completed = globalState.completedChapters.includes(id);
                
                // Calculer progression du chapitre
                const exercisesValidated = (globalState.validatedExercises[id] || []).length;
                const totalExercises = ch.exercises ? ch.exercises.length : 0;
                const quizDone = globalState.quizXP[id] > 0;
                const projectDone = completed;
                
                let progressPercent = 0;
                if (quizDone) progressPercent += 33;
                if (totalExercises > 0) progressPercent += Math.round((exercisesValidated / totalExercises) * 33);
                if (projectDone) progressPercent += 34;
                
                const card = document.createElement('div');
                card.className = 'chapter-card' + (completed ? ' completed' : '');
                card.onclick = () => openChapter(id);
                
                card.innerHTML = `
                    <div class="chapter-header">
                        <span class="chapter-icon">${ch.icon}</span>
                        <div class="chapter-title">
                            <h3>${ch.title}</h3>
                            <p>${ch.subtitle}</p>

                `;
                container.appendChild(card);
            }

        function openChapter(chapterId) {
            globalState.currentChapter = chapterId;
            
            // Vérifier la progression existante
            const quizDone = globalState.quizXP[chapterId] > 0;
            const exercisesValidated = (globalState.validatedExercises[chapterId] || []).length;
            const chapter = CHAPTERS[chapterId];
            const totalExercises = chapter.exercises ? chapter.exercises.length : 0;
            const isCompleted = globalState.completedChapters.includes(chapterId);
            
            // Si progression existante, proposer un choix
            if (quizDone || exercisesValidated > 0) {
                let message = `📊 Progression détectée pour ${chapter.title} :\n\n`;
                if (quizDone) message += `✅ Quiz complété\n`;
                if (exercisesValidated > 0) message += `✅ ${exercisesValidated}/${totalExercises} exercices validés\n`;
                if (isCompleted) message += `✅ Chapitre terminé\n`;
                
                message += `\nQue veux-tu faire ?\n\n`;
                message += `➡️ OK = Reprendre où tu en étais\n`;
                message += `❌ Annuler = Recommencer à zéro`;
                
                const continueProgress = confirm(message);
                
                if (!continueProgress) {
                    // Recommencer à zéro
                    delete globalState.quizXP[chapterId];
                    delete globalState.validatedExercises[chapterId];
                    saveProgress();
                    globalState.currentSection = 'theory';
                    globalState.quizScore = 0;
                    globalState.quizAnswered = 0;
                } else {
                    // Reprendre - aller directement à la bonne section
                    if (quizDone && exercisesValidated < totalExercises) {
                        globalState.currentSection = 'exercises';
                    } else if (quizDone && exercisesValidated >= totalExercises) {
                        globalState.currentSection = 'project';
                    } else {
                        globalState.currentSection = 'theory';
                    }
                    globalState.quizScore = 0;
                    globalState.quizAnswered = 0;
                }
            } else {
                globalState.currentSection = 'theory';
                globalState.quizScore = 0;
                globalState.quizAnswered = 0;
            }
            
            document.getElementById('main-view').classList.add('hidden');
            renderChapterView();
            document.getElementById('chapter-view').classList.remove('hidden');
            
            // Afficher directement la bonne section selon la progression
            if (globalState.currentSection === 'exercises') {
                document.getElementById('theory-section').classList.add('hidden');
                startExercises();
            } else if (globalState.currentSection === 'project') {
                document.getElementById('theory-section').classList.add('hidden');
                startProject();
            }
            
            window.scrollTo(0, 0);
        }

        function answerQuiz(questionIndex, answer, correct) {
            const chapter = CHAPTERS[globalState.currentChapter];
            const questionDiv = document.querySelector(`[data-index="${questionIndex}"]`);
            const options = questionDiv.querySelectorAll('.quiz-option');
            const feedback = questionDiv.querySelector('.quiz-feedback');
            
            options.forEach(btn => btn.disabled = true);
            
            const isCorrect = answer === correct;
            if (isCorrect) {
                options[answer].classList.add('correct');
                feedback.textContent = '✅ Correct ! Bien joué !';
                feedback.classList.add('correct');
                globalState.quizScore++;
            } else {
                options[answer].classList.add('wrong');
                options[correct].classList.add('correct');
                feedback.textContent = '❌ Incorrect. La bonne réponse est mise en évidence.';
                feedback.classList.add('wrong');
            }
            
            feedback.classList.remove('hidden');
            globalState.quizAnswered++;
            
            setTimeout(() => {
                if (globalState.quizAnswered < chapter.quiz.length) {
                    questionDiv.classList.add('hidden');
                    document.querySelector(`[data-index="${questionIndex + 1}"]`).classList.remove('hidden');
                    window.scrollTo(0, 0);
                } else {
                    showQuizResults();
                }
            }, 2000);
        }

        /**

        function createCodeMirrorEditor(textareaId) {
            const textarea = document.getElementById(textareaId);
            if (!textarea) {
                return null;

            const editor = CodeMirror.fromTextArea(textarea, {
                mode: 'javascript',
                theme: 'material-darker',
                lineNumbers: true,
                autoCloseBrackets: true,
                matchBrackets: true,
                styleActiveLine: true,
                indentUnit: 4,
                tabSize: 4,
                indentWithTabs: false,
                lineWrapping: false,
                scrollbarStyle: 'native',
                lint: {
                    esversion: 6,
                    asi: true,
                    boss: true,
                    expr: true,
                    browser: true,
                    devel: true,
                    undef: false,
                    unused: false
                },
                gutters: ['CodeMirror-lint-markers', 'CodeMirror-linenumbers'],
                extraKeys: {
                    'Tab': function(cm) {
                        cm.replaceSelection('    ', 'end');
                    }
                }
            });
            
            editor.setSize('100%', 300);
            return editor;

        /**
         * Analyse l'erreur JavaScript et donne un indice utile
         * @param {Error} error - L'erreur JavaScript
         * @return {string} Message d'aide
         */
        function getErrorHint(error) {
            const msg = error.message.toLowerCase();
            
            if (msg.includes('is not defined')) {
                const varName = error.message.split(' ')[0];
                return `❌ <strong>Variable non déclarée</strong><br>
                        <span style="color:#fbbf24">💡 Indice :</span> La variable <code>${varName}</code> n'existe pas. 
                        As-tu bien déclaré cette variable avec <code>let</code> ou <code>const</code> ?`;
            }
            if (msg.includes('unexpected token')) {
                return `❌ <strong>Erreur de syntaxe</strong><br>
                        <span style="color:#fbbf24">💡 Indice :</span> Vérifie les parenthèses <code>()</code>, 
                        accolades <code>{}</code> et points-virgules <code>;</code>`;
            }
            if (msg.includes('unexpected identifier')) {
                return `❌ <strong>Identifiant inattendu</strong><br>
                        <span style="color:#fbbf24">💡 Indice :</span> Il manque peut-être un opérateur ou un point-virgule 
                        avant ce mot.`;
            }
            if (msg.includes('missing') && msg.includes('after')) {
                return `❌ <strong>Élément manquant</strong><br>
                        <span style="color:#fbbf24">💡 Indice :</span> Vérifie qu'il ne manque pas de point-virgule, 
                        virgule ou parenthèse.`;
            }
            if (msg.includes('is not a function')) {
                const fnName = error.message.split(' ')[0];
                return `❌ <strong>Fonction invalide</strong><br>
                        <span style="color:#fbbf24">💡 Indice :</span> <code>${fnName}</code> n'est pas une fonction. 
                        Vérifie l'orthographe ou la déclaration.`;
            }
            if (msg.includes('cannot read') || msg.includes('undefined')) {
                return `❌ <strong>Valeur undefined</strong><br>
                        <span style="color:#fbbf24">💡 Indice :</span> Tu essaies d'accéder à une propriété d'une variable 
                        qui n'a pas de valeur.`;
            }
            
            return `❌ <strong>Erreur</strong> : ${error.message}<br>
                    <span style="color:#fbbf24">💡 Indice :</span> Relis ton code attentivement.`;
        }
        
        /**
         * Valide le code avec des messages de feedback détaillés
         * @param {string} code - Le code soumis
         * @param {Array} logs - Les sorties console.log
         * @param {Object} exercise - L'exercice avec ses critères
         * @return {Object} {success: boolean, message: string}
         */
        function validateWithFeedback(code, logs, exercise) {
            // Si l'exercice a une fonction validate personnalisée
            if (exercise.validate && exercise.validate(code, logs)) {
                return { success: true, message: '' };
            }
            
            // Analyse détaillée du code pour donner des indices précis
            const hints = [];
            const desc = exercise.desc.toLowerCase();
            const descOriginal = exercise.desc;
            
            // ========== VÉRIFICATION JSDOC ==========
            const needsJSDoc = desc.includes('jsdoc') || desc.includes('/**') || desc.includes('@param') || desc.includes('@return') || desc.includes('documenté') || desc.includes('commentaire');
            
            if (needsJSDoc || code.includes('function')) {
                // Vérifier si JSDoc est présent
                const hasJSDoc = code.includes('/**') && code.includes('*/');
                const hasParam = code.includes('@param');
                const hasReturn = code.includes('@return') || code.includes('@returns');
                
                // Compter les paramètres de la fonction
                const funcMatch = code.match(/function\s+\w+\s*\(([^)]*)\)/);
                const paramCount = funcMatch && funcMatch[1].trim() ? funcMatch[1].split(',').length : 0;
                
                // Compter les @param dans JSDoc
                const paramMatches = code.match(/@param/g);
                const jsDocParamCount = paramMatches ? paramMatches.length : 0;
                
                // Vérifier si la fonction a un return
                const hasReturnStatement = code.includes('return ') || code.includes('return;');
                
                // Vérifier si JSDoc est JUSTE AU-DESSUS de la fonction
                const jsDocPattern = /\/\*\*[\s\S]*?\*\/\s*\n\s*function/;
                const jsDocCorrectlyPlaced = jsDocPattern.test(code);
                
                // Vérifier si JSDoc est au début du fichier (mauvais placement)
                const jsDocAtStart = /^[\s\n]*"use strict";?\s*\n\s*\/\*\*/m.test(code) || /^[\s\n]*\/\*\*/m.test(code);
                const functionAfterJSDoc = /\/\*\*[\s\S]*?\*\/[\s\S]*?function/.test(code);
                const jsDocFarFromFunction = jsDocAtStart && functionAfterJSDoc && !jsDocCorrectlyPlaced;
                
                if (needsJSDoc && !hasJSDoc) {
                    hints.push('📝 <strong>JSDoc manquant</strong> : Ta fonction doit être documentée avec un bloc <code>/** ... */</code>');
                } else if (hasJSDoc) {
                    // Vérifier le placement
                    if (jsDocFarFromFunction) {
                        hints.push('📝 <strong>JSDoc mal placé</strong> : La documentation JSDoc doit être placée <strong>juste au-dessus</strong> de la fonction qu\'elle documente, pas au début du fichier !<br><em style="color:#94a3b8">Exemple correct :</em><pre style="background:#1e293b; padding:10px; border-radius:6px; margin-top:8px;">/** Description */\nfunction maFonction() { }</pre>');
                    } else if (!jsDocCorrectlyPlaced && code.includes('function')) {
                        hints.push('📝 <strong>JSDoc mal placé</strong> : Le bloc <code>/** ... */</code> doit être <strong>directement au-dessus</strong> de ta fonction (sans ligne vide entre les deux)');
                    }
                    
                    // Vérifier le contenu
                    if (paramCount > 0 && !hasParam) {
                        hints.push('📝 <strong>JSDoc incomplet</strong> : Il manque les <code>@param</code> pour documenter les paramètres de ta fonction');
                    } else if (paramCount > 0 && jsDocParamCount < paramCount) {
                        hints.push(`📝 <strong>JSDoc incomplet</strong> : Ta fonction a ${paramCount} paramètre(s) mais tu n'as documenté que ${jsDocParamCount} <code>@param</code>`);
                    }
                    
                    if (hasReturnStatement && !hasReturn) {
                        hints.push('📝 <strong>JSDoc incomplet</strong> : Ta fonction retourne une valeur, ajoute <code>@return</code> pour la documenter');
                    }
                    
                    // Vérifier le format des @param
                    if (hasParam) {
                        const paramFormatOK = /@param\s*\{[^}]+\}\s+\w+/.test(code);
                        if (!paramFormatOK) {
                            hints.push('📝 <strong>JSDoc format</strong> : Le format de <code>@param</code> doit être : <code>@param {type} nomParam - description</code>');
                        }
                    }
                    
                    // Vérifier le format de @return
                    if (hasReturn) {
                        const returnFormatOK = /@returns?\s*\{[^}]+\}/.test(code);
                        if (!returnFormatOK) {
                            hints.push('📝 <strong>JSDoc format</strong> : Le format de <code>@return</code> doit être : <code>@return {type} description</code>');
                        }
                    }
                }
            }
            
            // ========== VÉRIFICATION STRUCTURE DU CODE ==========
            if (desc.includes('function') && !code.includes('function')) {
                hints.push('🔧 <strong>Structure</strong> : Tu dois déclarer une fonction avec le mot-clé <code>function</code>');
            }
            
            if (desc.includes('return') && !code.includes('return')) {
                hints.push('🔧 <strong>Structure</strong> : Ta fonction doit retourner une valeur avec <code>return</code>');
            }
            
            if ((desc.includes('let ') || desc.includes('variable')) && !code.includes('let ') && !code.includes('const ')) {
                hints.push('🔧 <strong>Structure</strong> : Déclare tes variables avec <code>let</code> ou <code>const</code>');
            }
            
            if (desc.includes('const ') && !code.includes('const ')) {
                hints.push('🔧 <strong>Structure</strong> : Utilise <code>const</code> pour les constantes');
            }
            
            // ========== VÉRIFICATION BOUCLES & CONDITIONS ==========
            if (desc.includes(' if') && !code.includes('if')) {
                hints.push('🔀 <strong>Logique</strong> : Utilise une structure conditionnelle <code>if</code>');
            }
            
            if (desc.includes(' for') && !code.includes('for')) {
                hints.push('🔁 <strong>Boucle</strong> : Utilise une boucle <code>for</code>');
            }
            
            if (desc.includes('while') && !code.includes('while')) {
                hints.push('🔁 <strong>Boucle</strong> : Utilise une boucle <code>while</code>');
            }
            
            if (desc.includes('switch') && !code.includes('switch')) {
                hints.push('🔀 <strong>Logique</strong> : Utilise une structure <code>switch</code>');
            }
            
            // ========== VÉRIFICATION TABLEAUX & OBJETS ==========
            if ((desc.includes('tableau') || desc.includes('array') || desc.includes('[')) && !code.includes('[')) {
                hints.push('📦 <strong>Données</strong> : Tu dois utiliser un tableau avec les crochets <code>[]</code>');
            }
            
            if (desc.includes('.length') && !code.includes('.length')) {
                hints.push('📦 <strong>Données</strong> : Utilise <code>.length</code> pour obtenir la taille');
            }
            
            // ========== VÉRIFICATION SORTIE ==========
            if ((desc.includes('affiche') || desc.includes('console.log')) && !code.includes('console.log')) {
                hints.push('📤 <strong>Sortie</strong> : Utilise <code>console.log()</code> pour afficher le résultat');
            }
            
            if (desc.includes('affiche') && logs.length === 0 && code.includes('console.log')) {
                hints.push('📤 <strong>Sortie</strong> : Ton <code>console.log()</code> ne produit aucune sortie. Vérifie ce que tu affiches');
            }
            
            // ========== VÉRIFICATION OPÉRATEURS ==========
            if (desc.includes('addition') || desc.includes('somme')) {
                if (!code.includes('+')) {
                    hints.push('➕ <strong>Calcul</strong> : Utilise l\'opérateur <code>+</code> pour l\'addition');
                }
            }
            
            if (desc.includes('multiplication') || desc.includes('produit')) {
                if (!code.includes('*')) {
                    hints.push('✖️ <strong>Calcul</strong> : Utilise l\'opérateur <code>*</code> pour la multiplication');
                }
            }
            
            // ========== SI LE CODE EST SYNTAXIQUEMENT BON MAIS NE PASSE PAS LA VALIDATION ==========
            if (hints.length === 0) {
                // Le code a l'air correct structurellement, le problème est dans la logique ou les valeurs
                
                // Vérifier si c'est un problème de JSDoc même si non explicitement demandé
                if (code.includes('function') && !code.includes('/**')) {
                    hints.push('📝 <strong>Documentation</strong> : As-tu pensé à ajouter la documentation JSDoc à ta fonction ? (<code>/** ... */</code> avec <code>@param</code> et <code>@return</code>)');
                }
                
                // Vérifier la logique générale
                if (code.includes('function') && code.includes('return')) {
                    hints.push('🧪 <strong>Logique</strong> : Ta fonction existe et retourne quelque chose, mais le résultat n\'est pas celui attendu. Vérifie ton algorithme');
                }
                
                if (logs.length > 0) {
                    hints.push('🔍 <strong>Résultat</strong> : Ta sortie est : <code>' + logs[0].substring(0, 50) + (logs[0].length > 50 ? '...' : '') + '</code>. Est-ce bien ce qui est demandé ?');
                }
            }
            
            // ========== CONSTRUIRE LE MESSAGE ==========
            if (hints.length > 0) {
                const hintList = hints.map(h => `<div style="margin: 8px 0; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px;">${h}</div>`).join('');
                return {
                    success: false,
                    message: `❌ <strong>Pas tout à fait...</strong><br><br>
                              <div style="color:#fbbf24; font-weight: 600; margin-bottom: 10px;">💡 Indices :</div>
                              ${hintList}
                              <br><em style="color:#94a3b8">Corrige les points mentionnés ci-dessus.</em>`
                };
            }
            
            // Message générique si vraiment aucun indice trouvé
            return {
                success: false,
                message: `❌ <strong>Résultat incorrect</strong><br><br>
                          <span style="color:#fbbf24">💡 Indice :</span> Le code semble correct structurellement mais ne produit pas le résultat attendu.<br><br>
                          <div style="padding: 10px; background: rgba(0,0,0,0.2); border-radius: 6px;">
                          🔍 Vérifie :<br>
                          • La logique de ton algorithme<br>
                          • Les valeurs utilisées<br>
                          • Le format de sortie attendu
                          </div>`
            };
        }

        // ========== PROJET ==========

            // Zone de test DOM pour les chapitres qui en ont besoin
            const isDOMChapter = ['js07', 'js08', 'js09', 'js12'].includes(globalState.currentChapter);

                                <div class="photo" style="display:inline-block;width:50px;height:50px;background:#555;margin:3px;text-align:center;line-height:50px;">📷2</div>
                                <div class="photo" style="display:inline-block;width:50px;height:50px;background:#555;margin:3px;text-align:center;line-height:50px;">📷3</div>
                            </div>
                            <p class="legende">Légende 1</p>
                            <p class="legende">Légende 2</p>
                        </div>
                    </div>`;
            }
            
            // Récupérer le code sauvegardé ou le code par défaut
            const defaultCode = '"use strict";\n// Ton code ici...\n';
            const savedCode = getSavedCode(globalState.currentChapter, 'project') || defaultCode;
            
            container.innerHTML = `
                <div class="exercise-card">
                    <h3>${chapter.project.title}</h3>
                    <div class="exercise-desc">${chapter.project.desc}</div>
                    ${testHTML}
                    <div class="code-editor">
                        <div class="editor-header">
                            <span>📝 Éditeur JavaScript</span>
                            <button class="run-btn" onclick="runProject()">▶ Exécuter</button>
                        </div>
                        <div class="cm-editor-wrapper">
                            <textarea class="code-input" id="code-project">${savedCode}</textarea>
                        </div>
                    </div>
                    <div class="output-section">
                        <div class="output-header">📊 Console</div>
                        <pre class="code-output" id="output-project"></pre>
                    </div>
                    <div class="validation hidden" id="validation-project"></div>
                    <button class="btn-success hidden" id="complete-btn" onclick="completeChapter()">
                        ✅ Terminer le chapitre et gagner ${chapter.xp} XP !
                    </button>
                </div>
            `;
            
            // Initialiser CodeMirror pour le projet
            cmEditors['code-project'] = createCodeMirrorEditor('code-project');
            
            window.scrollTo(0, 0);
        }

        function runProject() {
            const chapter = CHAPTERS[globalState.currentChapter];
            // Récupérer le code depuis CodeMirror
            const editor = cmEditors['code-project'];
            const code = editor ? editor.getValue() : document.getElementById('code-project').value;
            const output = document.getElementById('output-project');
            const validation = document.getElementById('validation-project');
            const completeBtn = document.getElementById('complete-btn');
            
            // Réinitialiser la zone de test DOM si elle existe
            const testZone = document.getElementById('test-content-project');
            if (testZone) {
                testZone.innerHTML = `
                    <h2 id="titre">Titre original</h2>
                    <p id="message">Message original</p>
                    <p id="demo"><b>Texte en gras</b> et texte normal</p>
                    <div id="box" style="padding:15px;border:2px solid #444;margin:10px 0;background:#333;">Box de test (id="box")</div>
                    <div id="liste">Liste originale</div>
                    <div id="description">Description originale</div>
                    <div id="image1" style="width:60px;height:60px;background:#666;display:inline-block;margin:5px;">Img1</div>
                    <div id="footer">Footer original</div>
                    <button id="btn" style="margin:5px;padding:8px 15px;">Bouton test</button>
                    <div id="zone" style="padding:15px;background:#444;margin:10px 0;cursor:pointer;">Zone événements</div>
                    <form id="formulaire" name="frm1" style="margin:10px 0;padding:10px;border:1px solid #555;border-radius:5px;">
                        <input type="text" id="nom" name="nom" placeholder="Nom" value="Dupont" style="margin:3px;padding:5px;"><br>
                        <input type="text" id="prenom" name="prenom" placeholder="Prénom" value="Jean" style="margin:3px;padding:5px;"><br>
                        <input type="email" id="email" name="email" placeholder="Email" value="test@email.com" style="margin:3px;padding:5px;"><br>
                        <label><input type="checkbox" id="accepte" name="accepte" checked> J'accepte</label>
                    </form>
                    <div style="margin:10px 0;">
                        <div class="photo" style="display:inline-block;width:50px;height:50px;background:#555;margin:3px;text-align:center;line-height:50px;">📷1</div>
                        <div class="photo" style="display:inline-block;width:50px;height:50px;background:#555;margin:3px;text-align:center;line-height:50px;">📷2</div>
                        <div class="photo" style="display:inline-block;width:50px;height:50px;background:#555;margin:3px;text-align:center;line-height:50px;">📷3</div>
                    </div>
                    <p class="legende">Légende 1</p>
                    <p class="legende">Légende 2</p>
                `;
            }
            
            output.textContent = '';
            output.classList.remove('error');
            validation.classList.add('hidden');
            
            // Sauvegarder le code du projet
            saveCode(globalState.currentChapter, 'project', code);
            
            const logs = [];
            const originalLog = console.log;
            console.log = function(...args) {
                logs.push(args.join(' '));
                originalLog.apply(console, args);
            };
            
            try {
                eval(code);
                output.textContent = logs.join('\n') || '(Aucune sortie)';
                
                // Validation avec feedback détaillé pour le projet
                const project = chapter.project;
                const validationResult = validateWithFeedback(code, logs, project);
                
                if (validationResult.success && !globalState.completedChapters.includes(globalState.currentChapter)) {
                    validation.innerHTML = '✅ <strong>Projet réussi !</strong> Tu peux maintenant terminer le chapitre !';
                    validation.classList.add('success');
                    validation.classList.remove('hidden');
                    completeBtn.classList.remove('hidden');
                } else if (validationResult.success) {
                    validation.innerHTML = '✅ <strong>Projet déjà validé !</strong>';
                    validation.classList.add('success');
                    validation.classList.remove('hidden');
                } else {
                    validation.innerHTML = validationResult.message;
                    validation.classList.add('error');
                    validation.classList.remove('hidden');
                }
            } catch (error) {
                output.classList.add('error');
                output.textContent = `❌ Erreur : ${error.message}`;
                validation.innerHTML = getErrorHint(error);
                validation.classList.add('error');
                validation.classList.remove('hidden');
            } finally {
                console.log = originalLog;
            }
        }

        function completeChapter() {
            const chapter = CHAPTERS[globalState.currentChapter];
            
            if (!globalState.completedChapters.includes(globalState.currentChapter)) {
                globalState.completedChapters.push(globalState.currentChapter);
                globalState.totalXP += chapter.xp;
                updateHeader();
                saveProgress();
                
                alert(`🎉 Félicitations !\n\nChapitre ${chapter.title} terminé !\n\n` +
                      `+${chapter.xp} XP gagnés !\n\n` +
                      `XP Total : ${globalState.totalXP}\n` +
                      `Niveau : ${calculateLevel(globalState.totalXP)}`);
            }
            
            backToGrid();
        }

        // ========== LANCEMENT ==========
        window.onload = init;
    </script>
